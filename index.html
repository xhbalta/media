<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Balta Media</title>
    <!-- Manifest PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0F0F0F">
    <!-- Iconos -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <!-- Fuentes y Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* ========== ESTILOS GLOBALES ========== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050505;
            color: white;
            overflow-x: hidden;
            margin: 0;
            transition: margin-left 0.3s ease;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Toast personalizado */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(8px);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            border-left: 4px solid #3b82f6;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-size: 14px;
            font-weight: 500;
            max-width: 300px;
            transform: translateX(100%);
            animation: slideIn 0.3s forwards;
            pointer-events: auto;
        }
        @keyframes slideIn { to { transform: translateX(0); } }

        /* ========== HEADER SUPERIOR (común) ========== */
        .main-header {
            position: sticky;
            top: 0;
            z-index: 800;
            background: rgba(5,5,5,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 0.75rem 1rem;
        }
        .header-container {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-area img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
        }
        .logo-area span {
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-actions a, .header-actions button {
            color: #aaa;
            transition: color 0.2s;
            background: none;
            border: none;
            cursor: pointer;
        }
        .header-actions a:hover, .header-actions button:hover {
            color: white;
        }
        .header-actions img {
            width: 20px;
            height: 20px;
            filter: brightness(0.8);
            transition: filter 0.2s;
        }
        .header-actions a:hover img, .header-actions button:hover img {
            filter: brightness(1.2);
        }
        .desktop-search {
            display: none;
        }
        @media (min-width: 1024px) {
            .desktop-search {
                display: flex;
                align-items: center;
                background: rgba(255,255,255,0.1);
                border-radius: 999px;
                padding: 0.4rem 1rem;
                border: 1px solid rgba(255,255,255,0.1);
                width: 300px;
            }
            .desktop-search input {
                background: transparent;
                border: none;
                color: white;
                width: 100%;
                outline: none;
                font-size: 0.9rem;
            }
            .desktop-search input::placeholder {
                color: #666;
            }
        }

        /* ========== BARRA DE CATEGORÍAS (píldoras) ========== */
        .category-bar {
            background: rgba(5,5,5,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 0.5rem 1rem;
            position: sticky;
            top: 60px; /* altura aproximada del header */
            z-index: 700;
        }
        .category-container {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .category-pill {
            white-space: nowrap;
            padding: 0.3rem 1rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(255,255,255,0.1);
            color: #ccc;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }
        .category-pill:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .category-pill.active {
            background: white;
            color: black;
        }

        /* ========== BARRA LATERAL (solo escritorio) ========== */
        .desktop-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            background: #0F0F0F;
            color: #fff;
            z-index: 900;
            transition: width 0.3s ease;
            overflow-x: hidden;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
            scrollbar-width: none;
        }
        .desktop-sidebar::-webkit-scrollbar { display: none; }
        .desktop-sidebar.collapsed { width: 70px; }
        .desktop-sidebar.expanded { width: 220px; }
        @media (max-width: 1023px) { .desktop-sidebar { display: none; } }

        .sidebar-toggle {
            display: flex;
            justify-content: flex-end;
            padding: 16px 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .sidebar-toggle svg {
            width: 24px;
            height: 24px;
            fill: white;
            transition: transform 0.2s;
        }
        .desktop-sidebar.expanded .sidebar-toggle svg { transform: rotate(180deg); }

        .nav-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 8px;
            margin-bottom: 30px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: rgba(255,255,255,0.2); }
        .nav-item img { width: 24px; height: 24px; filter: brightness(1.2); flex-shrink: 0; }
        .nav-item span { font-size: 14px; font-weight: 500; }
        .desktop-sidebar.collapsed .nav-item span { display: none; }

        .rec-section {
            padding: 0 8px;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 16px;
        }
        .desktop-sidebar.collapsed .rec-section { display: none; }
        .rec-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .rec-header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .rec-header a:hover { opacity: 1; }
        .rec-header svg { width: 16px; height: 16px; fill: white; }
        .rec-list { display: flex; flex-direction: column; gap: 12px; }
        .rec-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        .rec-item-info { flex: 1; min-width: 0; cursor: pointer; }
        .rec-item-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rec-item-author {
            font-size: 11px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rec-play-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .rec-play-btn:hover { background: rgba(255,255,255,0.2); }
        .rec-play-btn svg { width: 18px; height: 18px; fill: white; }

        /* ========== BARRA INFERIOR (solo móvil) ========== */
        .mobile-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0F0F0F;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 800;
        }
        @media (min-width: 1024px) { .mobile-bottom-nav { display: none; } }
        .mobile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #aaa;
            text-decoration: none;
            font-size: 0.7rem;
            gap: 4px;
        }
        .mobile-nav-item.active { color: white; }
        .mobile-nav-item img { width: 24px; height: 24px; filter: brightness(0.8); }
        .mobile-nav-item.active img { filter: brightness(1.2); }

        /* ========== CONTENEDOR PRINCIPAL ========== */
        #main-content {
            max-width: 1600px;
            margin: 1rem auto;
            padding: 0 1rem;
            min-height: calc(100vh - 120px);
        }
        @media (max-width: 1023px) {
            #main-content {
                margin-bottom: 70px; /* espacio para barra inferior */
            }
        }

        /* ========== COMPONENTES REUTILIZABLES ========== */
        /* Tarjeta estándar */
        .card-std {
            min-width: 180px;
            width: 100%;
            max-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
        }
        .card-std .img-container {
            position: relative;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a1a;
        }
        .card-std img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .card-std:hover img { transform: scale(1.05); }
        .card-std .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-radius: 12px;
        }
        .card-std:hover .overlay { opacity: 1; }
        .card-std .mobile-play {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .card-std .mobile-play img { width: 20px; height: 20px; filter: brightness(0) invert(1); }
        @media (min-width: 1024px) { .card-std .mobile-play { display: none; } }

        /* Tarjeta de video expandible */
        .card-video {
            height: 200px;
            width: 200px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            transition: width 0.5s;
            cursor: pointer;
        }
        @media (min-width: 1024px) { .card-video:hover { width: 350px; } }
        .card-video img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }
        .card-video .img-wide { opacity: 0; }
        .card-video:hover .img-wide { opacity: 1; }
        .card-video .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 3;
        }
        .card-video:hover .overlay { opacity: 1; }
        .video-badge {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 2;
        }

        /* Elemento de lista (para top semanal y series) */
        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
            cursor: pointer;
            width: 100%;
        }
        .list-item:hover { background: rgba(255,255,255,0.08); }
        .list-item .index {
            width: 24px;
            text-align: center;
            color: #666;
            font-weight: bold;
            flex-shrink: 0;
        }
        .list-item .thumbnail {
            width: 56px;
            height: 56px;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }
        .list-item .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .list-item .thumbnail .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .list-item:hover .thumbnail .play-overlay { opacity: 1; }
        .list-item .info {
            flex: 1;
            min-width: 0;
        }
        .list-item .title {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white;
        }
        .list-item .author {
            font-size: 0.8rem;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .list-item .add-btn {
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        .list-item .add-btn:hover { opacity: 1; }
        .list-item .add-btn img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        /* Grupo de listas (para carrusel de listas) */
        .list-group {
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Carrusel */
        .carousel-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }
        .carousel-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding: 0 4px;
        }
        .carousel-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .carousel-header button {
            background: none;
            border: none;
            color: #aaa;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
        }
        .carousel-header button:hover { color: white; }
        .carousel-scroll {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 4px 4px 8px;
        }
        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .carousel-wrapper:hover .carousel-nav { opacity: 1; }
        .carousel-nav.left { left: 0; }
        .carousel-nav.right { right: 0; }

        /* Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        @media (min-width: 640px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .grid-container { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1280px) { .grid-container { grid-template-columns: repeat(5, 1fr); } }

        /* Vista de detalle (serie/episodio) - reutilizamos estilos del podcast-widget */
        .podcast-widget { width: 100%; }
        .podcast-header { position: relative; border-radius: 40px; overflow: hidden; margin-bottom: 2rem; }
        .podcast-header-bg {
            position: absolute; inset: 0; background-size: cover; background-position: center;
            filter: blur(20px) brightness(0.7); transform: scale(1.2); z-index: 0;
        }
        .podcast-header::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
            z-index: 1;
        }
        .podcast-header-content {
            position: relative; z-index: 2; display: flex; align-items: flex-end; gap: 2rem;
            padding: 2rem; min-height: 300px;
        }
        .podcast-thumbnail img { width: 160px; height: 160px; border-radius: 32px; object-fit: cover; }
        .podcast-info { flex: 1; }
        .podcast-info h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        .podcast-info .author { font-size: 1.1rem; color: #ccc; margin-bottom: 0.5rem; }
        .podcast-info .description { color: #aaa; line-height: 1.5; }
        .podcast-control-bar {
            position: relative; z-index: 2; display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 1rem; padding: 1rem 2rem 2rem;
        }
        .podcast-left-actions { display: flex; align-items: center; gap: 1rem; }
        .podcast-icon-btn {
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15);
            width: 50px; height: 50px; border-radius: 20px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .podcast-icon-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .podcast-icon-btn img { width: 24px; height: 24px; filter: brightness(0) invert(1); }
        .podcast-last-episode-btn {
            background: #7b2eda; border: none; border-radius: 40px; padding: 0.5rem 2rem;
            display: flex; align-items: center; gap: 1rem; cursor: pointer; transition: 0.2s;
        }
        .podcast-last-episode-btn:hover { background: #8f3ef0; transform: scale(1.02); }
        .podcast-play-icon-large {
            background: rgba(255,255,255,0.25); border-radius: 50%; width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
        }
        .podcast-play-icon-large img { width: 24px; height: 24px; filter: brightness(0) invert(1); margin-left: 3px; }
        .podcast-episodes-list { display: flex; flex-direction: column; gap: 1rem; }

        /* Parte del programa (en episodio individual) */
        .part-of-program {
            margin-top: 2rem; padding: 2rem; background: rgba(30,41,59,0.5); backdrop-filter: blur(8px);
            border-radius: 36px; border: 1px solid rgba(255,255,255,0.05);
        }
        .program-card { display: flex; align-items: center; gap: 2rem; cursor: pointer; }
        .program-card img { width: 100px; height: 100px; border-radius: 24px; object-fit: cover; }

        /* Página de explorar (categorías) */
        .explore-categories {
            display: grid; grid-template-columns: repeat(2,1fr); gap: 1rem;
        }
        .category-card {
            background: rgba(255,255,255,0.05); border-radius: 16px; padding: 1.5rem;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .category-card:hover { background: rgba(255,255,255,0.1); }
        .category-card .icon { font-size: 2rem; margin-bottom: 0.5rem; }

        /* Página de instalación */
        .app-install { text-align: center; padding: 3rem 1rem; }
        .install-btn {
            background: #3b82f6; border: none; color: white; padding: 1rem 2rem;
            border-radius: 40px; font-weight: bold; font-size: 1.2rem; cursor: pointer;
        }
    </style>
</head>
<body>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- HEADER SUPERIOR (común) -->
<header class="main-header">
    <div class="header-container">
        <a href="/" class="logo-area" onclick="event.preventDefault(); Router.navigate('/')">
            <img src="https://media.baltaanay.org/web/image/885-f3d79ca9/xhbalta-aula.png" alt="Logo">
            <span>Balta Media</span>
        </a>

        <!-- Buscador desktop (solo visible en escritorio, dentro del header) -->
        <div class="desktop-search">
            <input type="text" id="desktopSearchInput" placeholder="Buscar episodios, series..." onkeypress="if(event.key==='Enter'){ const q=this.value.trim(); if(q) Router.navigate('/buscar?q='+encodeURIComponent(q)); }">
        </div>

        <div class="header-actions">
            <!-- En móvil, el ícono de búsqueda lleva a /buscar -->
            <a href="/buscar" class="lg:hidden" onclick="event.preventDefault(); Router.navigate('/buscar')">
                <img src="https://media.baltaanay.org/web/image/793-902e5b33/Search%20%282%29.png" alt="Buscar">
            </a>
            <a href="/novedades" onclick="event.preventDefault(); Router.navigate('/novedades')">
                <img src="https://media.baltaanay.org/web/image/796-aee658de/Explore.png" alt="Novedades">
            </a>
            <button id="userActionBtn" class="w-8 h-8 rounded-full overflow-hidden bg-gradient-to-br from-blue-400 to-purple-500"></button>
        </div>
    </div>
</header>

<!-- BARRA DE CATEGORÍAS (píldoras) -->
<div class="category-bar" id="categoryBar">
    <div class="category-container" id="categoryPills"></div>
</div>

<!-- BARRA LATERAL (solo escritorio) -->
<div id="sidebarContainer"></div>

<!-- BARRA INFERIOR (solo móvil) -->
<nav class="mobile-bottom-nav" id="mobileBottomNav">
    <a href="/" class="mobile-nav-item" onclick="event.preventDefault(); Router.navigate('/')">
        <img src="https://media.baltaanay.org/web/image/798-1b947c8d/Home%20%282%29.webp" alt="Inicio">
        <span>Inicio</span>
    </a>
    <a href="/buscar" class="mobile-nav-item" onclick="event.preventDefault(); Router.navigate('/buscar')">

<!-- Scripts -->
<script src="episodios.js"></script>
<script>
    // ========== ICONOS GLOBALES ==========
    const ICONS = {
        play: 'https://marca1.odoo.com/web/image/508-f876320c/play.svg',
        add: 'https://marca1.odoo.com/web/image/509-c555b4ef/a%C3%B1adir%20a.svg',
        added: 'https://nikichitonjesus.odoo.com/web/image/1112-d141b3eb/a%C3%B1adido.png',
        dl: 'https://marca1.odoo.com/web/image/510-7a9035c1/descargar.svg',
        noDl: 'https://nikichitonjesus.odoo.com/web/image/1051-622a3db3/no-desc.webp',
        remove: 'https://nikichitonjesus.odoo.com/web/image/811-8a809533/remove.png',
        share: 'https://marca1.odoo.com/web/image/511-3d2d2e2c/compartir.svg'
    };

    // ========== DATOS PROCESADOS ==========
    const DATA = window.processEpisodes();  // viene de episodios.js

    // ========== TOAST ==========
    function showToast(message) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    window.showToast = showToast;

    // ========== FUNCIONES DE PLAYLIST (basadas en localStorage) ==========
    function getPlaylist() {
        return JSON.parse(localStorage.getItem('playlist')) || [];
    }

    function savePlaylist(pl) {
        localStorage.setItem('playlist', JSON.stringify(pl));
    }

    window.addToUserPlaylist = function(episodeData) {
        if (!episodeData || !episodeData.mediaUrl) return false;
        let playlist = getPlaylist();
        if (playlist.some(item => item.mediaUrl === episodeData.mediaUrl)) {
            showToast('Ya está en tu lista');
            return false;
        }
        playlist.push({
            mediaUrl: episodeData.mediaUrl,
            type: episodeData.type,
            cover: episodeData.cover,
            title: episodeData.title,
            detailUrl: episodeData.detailUrl,
            author: episodeData.author,
            description: episodeData.description,
            allowDownload: episodeData.allowDownload
        });
        savePlaylist(playlist);
        showToast('Añadido a Mi lista');
        // Actualizar todos los botones de añadir en la interfaz
        document.querySelectorAll('[data-mediaurl] .add-btn-img').forEach(img => {
            if (img.closest('[data-mediaurl]').getAttribute('data-mediaurl') === episodeData.mediaUrl) {
                img.src = ICONS.added;
            }
        });
        return true;
    };

    window.removeFromUserPlaylist = function(mediaUrl) {
        let playlist = getPlaylist();
        const newPlaylist = playlist.filter(item => item.mediaUrl !== mediaUrl);
        if (newPlaylist.length < playlist.length) {
            savePlaylist(newPlaylist);
            showToast('Eliminado de Mi lista');
            // Actualizar botones
            document.querySelectorAll('[data-mediaurl] .add-btn-img').forEach(img => {
                if (img.closest('[data-mediaurl]').getAttribute('data-mediaurl') === mediaUrl) {
                    img.src = ICONS.add;
                }
            });
            return true;
        }
        return false;
    };

    function isInPlaylist(mediaUrl) {
        return getPlaylist().some(item => item.mediaUrl === mediaUrl);
    }

    window.togglePlaylist = function(episodeData) {
        if (isInPlaylist(episodeData.mediaUrl)) {
            window.removeFromUserPlaylist(episodeData.mediaUrl);
            return false;
        } else {
            window.addToUserPlaylist(episodeData);
            return true;
        }
    };

    // ========== REPRODUCCIÓN ==========
    window.playEpisode = function(episodeData) {
        if (typeof window.playEpisodeExpanded === 'function') {
            window.playEpisodeExpanded(
                episodeData.mediaUrl,
                episodeData.type,
                episodeData.cover,
                episodeData.coverWide || episodeData.cover,
                episodeData.title,
                episodeData.detailUrl,
                episodeData.author,
                [],  // next (podría ser lista completa)
                episodeData.description,
                episodeData.allowDownload
            );
        } else {
            // Fallback: abrir en nueva pestaña
            window.open(episodeData.mediaUrl, '_blank');
        }
    };

    // ========== DESCARGA ==========
    window.downloadEpisode = function(episodeData) {
        if (!episodeData.allowDownload) {
            showToast('Descarga no disponible');
            return;
        }
        const a = document.createElement('a');
        a.href = episodeData.mediaUrl;
        a.download = episodeData.title.replace(/[^a-z0-9]/gi, '_') + (episodeData.type === 'video' ? '.mp4' : '.mp3');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        // Si falla por CORS, abrir en nueva pestaña
        setTimeout(() => {
            if (!a.href.startsWith('blob:')) {
                window.open(episodeData.mediaUrl, '_blank');
            }
        }, 1000);
    };

    // ========== COMPARTIR ==========
    window.shareEpisode = function(title, url) {
        if (navigator.share) {
            navigator.share({ title, url });
        } else {
            navigator.clipboard.writeText(url);
            showToast('Enlace copiado');
        }
    };

    // ========== RENDERIZADO DE COMPONENTES ==========
    function normalizeItem(item) {
        return {
            ...item,
            cover: item.cover || 'https://via.placeholder.com/200x200?text=No+image',
            coverWide: item.coverWide || item.cover
        };
    }

    // Tarjeta estándar
    function renderCard(item) {
        const ep = normalizeItem(item);
        const inPlaylist = isInPlaylist(ep.mediaUrl);
        return `
            <div class="card-std" data-mediaurl="${ep.mediaUrl}">
                <div class="img-container" onclick="playEpisode(${JSON.stringify(ep).replace(/"/g, '&quot;')})">
                    <img src="${ep.cover}" loading="lazy">
                    <div class="overlay">
                        <img src="${inPlaylist ? ICONS.added : ICONS.add}" class="w-7 h-7 cursor-pointer hover:scale-110 transition" onclick="event.stopPropagation(); togglePlaylist(${JSON.stringify(ep).replace(/"/g, '&quot;')})" title="${inPlaylist ? 'Quitar de lista' : 'Añadir a lista'}">
                        <img src="${ICONS.play}" class="w-9 h-9 cursor-pointer hover:scale-110 transition" onclick="event.stopPropagation(); playEpisode(${JSON.stringify(ep).replace(/"/g, '&quot;')})" title="Reproducir">
                        <img src="${ep.allowDownload ? ICONS.dl : ICONS.noDl}" class="w-7 h-7 cursor-pointer hover:scale-110 transition" onclick="event.stopPropagation(); downloadEpisode(${JSON.stringify(ep).replace(/"/g, '&quot;')})" title="${ep.allowDownload ? 'Descargar' : 'No disponible'}">
                    </div>
                    <span class="mobile-play" onclick="event.stopPropagation(); playEpisode(${JSON.stringify(ep).replace(/"/g, '&quot;')})">
                        <img src="${ICONS.play}">
                    </span>
                </div>
                <div onclick="Router.navigate('${ep.detailUrl}')">
                    <div class="font-bold text-sm text-white truncate">${ep.title}</div>
                    <div class="text-xs text-gray-500 truncate">${ep.author}</div>
                </div>
            </div>
        `;
    }

    // Tarjeta de video expandible
    function renderVideoCard(item) {
        const ep = normalizeItem(item);
        const inPlaylist = isInPlaylist(ep.mediaUrl);
        const hasWide = ep.coverWide && ep.coverWide !== ep.cover;
        return `
            <div class="card-video group" data-mediaurl="${ep.mediaUrl}">
                <img src="${ep.cover}" class="img-default">
                ${hasWide ? `<img src="${ep.coverWide}" class="img-wide">` : ''}
                <div class="overlay">
                    <img src="${inPlaylist ? ICONS.added : ICONS.add}" class="w-7 h-7 cursor-pointer hover:scale-110 transition" onclick="event.stopPropagation(); togglePlaylist(${JSON.stringify(ep).replace(/"/g, '&quot;')})">
                    <img src="${ICONS.play}" class="w-9 h-9 cursor-pointer hover:scale-110 transition" onclick="event.stopPropagation(); playEpisode(${JSON.stringify(ep).replace(/"/g, '&quot;')})">
                    <img src="${ep.allowDownload ? ICONS.dl : ICONS.noDl}" class="w-7 h-7 cursor-pointer hover:scale-110 transition" onclick="event.stopPropagation(); downloadEpisode(${JSON.stringify(ep).replace(/"/g, '&quot;')})">
                </div>
                <span class="mobile-play" onclick="event.stopPropagation(); playEpisode(${JSON.stringify(ep).replace(/"/g, '&quot;')})">
                    <img src="${ICONS.play}">
                </span>
                <div class="video-badge">VIDEO</div>
            </div>
        `;
    }

    // Elemento de lista (para top semanal y series)
    function renderListItem(item, index) {
        const ep = normalizeItem(item);
        const inPlaylist = isInPlaylist(ep.mediaUrl);
        return `
            <div class="list-item" data-mediaurl="${ep.mediaUrl}">
                <span class="index">${index+1}</span>
                <div class="thumbnail" onclick="Router.navigate('${ep.detailUrl}')">
                    <img src="${ep.cover}" loading="lazy">
                    <div class="play-overlay" onclick="event.stopPropagation(); playEpisode(${JSON.stringify(ep).replace(/"/g, '&quot;')})">
                        <img src="${ICONS.play}" class="w-5 h-5 filter invert">
                    </div>
                </div>
                <div class="info" onclick="Router.navigate('${ep.detailUrl}')">
                    <div class="title">${ep.title}</div>
                    <div class="author">${ep.author}</div>
                </div>
                <button class="add-btn" onclick="event.stopPropagation(); togglePlaylist(${JSON.stringify(ep).replace(/"/g, '&quot;')})">
                    <img src="${inPlaylist ? ICONS.added : ICONS.add}" class="add-btn-img">
                </button>
            </div>
        `;
    }

    // ========== RENDERIZADO DE VISTAS ==========
    function renderFeed() {
        const getRandom = (count, filter) => {
            let filtered = filter ? DATA.filter(filter) : DATA;
            if (filtered.length === 0) return [];
            return [...filtered].sort(() => 0.5 - Math.random()).slice(0, count);
        };

        // Carrusel de listas (Top Semanal)
        const topWeekly = getRandom(16);
        let listGroups = '';
        for (let i = 0; i < topWeekly.length; i += 4) {
            listGroups += '<div class="list-group">';
            for (let j = 0; j < 4 && i+j < topWeekly.length; j++) {
                listGroups += renderListItem(topWeekly[i+j], i+j);
            }
            listGroups += '</div>';
        }

        // Carrusel de series
        const seriesMap = {};
        DATA.forEach(ep => {
            if (ep.series && ep.series.titulo_serie) {
                const key = ep.series.titulo_serie;
                if (!seriesMap[key]) seriesMap[key] = { info: ep.series, episodes: [] };
                seriesMap[key].episodes.push(ep);
            }
        });
        let seriesArray = Object.values(seriesMap).sort(() => 0.5 - Math.random());
        let seriesGroups = '';
        seriesArray.forEach(serie => {
            const s = serie.info;
            const eps = serie.episodes.sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,4);
            seriesGroups += '<div class="list-group">';
            seriesGroups += `
                <div class="list-item" style="padding-left:0;" onclick="Router.navigate('${s.url_serie}')">
                    <div class="thumbnail" style="width:56px; height:56px;">
                        <img src="${s.portada_serie || eps[0]?.cover}">
                    </div>
                    <div class="info">
                        <div class="title">${s.titulo_serie}</div>
                        <div class="author">${eps.length} episodios</div>
                    </div>
                </div>
            `;
            eps.forEach((ep, idx) => {
                seriesGroups += renderListItem(ep, idx);
            });
            seriesGroups += '</div>';
        });

        function carousel(title, content, type = 'standard') {
            const id = 'c' + Math.random().toString(36).substr(2,9);
            let inner = '';
            if (type === 'list') {
                inner = `<div id="${id}" class="carousel-scroll no-scrollbar" style="gap:2rem;">${content}</div>`;
            } else {
                inner = `<div id="${id}" class="carousel-scroll no-scrollbar">${content}</div>`;
            }
            return `
                <div class="carousel-wrapper">
                    <div class="carousel-header">
                        <h2>${title}</h2>
                        <button onclick="Router.navigate('/categoria/${title}')">Ver todo</button>
                    </div>
                    <div class="relative">
                        <div class="carousel-nav left" onclick="document.getElementById('${id}').scrollLeft -= 400">❮</div>
                        ${inner}
                        <div class="carousel-nav right" onclick="document.getElementById('${id}').scrollLeft += 400">❯</div>
                    </div>
                </div>
            `;
        }

        let html = '';
        html += carousel('Nuevos Lanzamientos', getRandom(15, ep => new Date(ep.date) > new Date(Date.now()-30*24*60*60*1000)).map(renderCard).join(''));
        html += carousel('Series de Video', getRandom(10, e => e.type === 'video').map(renderVideoCard).join(''), 'expand');
        html += carousel('Top Semanal', listGroups, 'list');
        html += carousel('Para Estudiar Profundamente', getRandom(20, e => e.categories.includes('Matemáticas') || e.categories.includes('Física')).map(renderCard).join(''), 'double');
        html += carousel('Matemáticas', getRandom(15, e => e.categories.includes('Matemáticas')).map(renderCard).join(''));
        html += carousel('Especiales en Video', getRandom(10, e => e.type === 'video' && e.categories.includes('Documentales')).map(renderVideoCard).join(''), 'expand');
        html += carousel('Física y Astronomía', getRandom(15, e => e.categories.includes('Física')).map(renderCard).join(''));
        html += carousel('Ciencias Naturales y Tecnología', getRandom(20, e => e.categories.some(c => ['Ciencias Naturales','Tecnología'].includes(c))).map(renderCard).join(''), 'double');
        html += carousel('Series y Cursos Académicos', seriesGroups, 'list');
        html += carousel('Otras Ciencias', getRandom(15, e => e.categories.includes('Otras Ciencias')).map(renderCard).join(''));
        return html;
    }

    function renderSearchResults(query) {
        const term = query.toLowerCase().trim();
        const results = DATA.filter(ep =>
            ep.title.toLowerCase().includes(term) ||
            ep.author.toLowerCase().includes(term) ||
            ep.categories.some(c => c.toLowerCase().includes(term)) ||
            ep.description.toLowerCase().includes(term)
        );
        if (results.length === 0) {
            return `<div class="text-center py-10">No hay resultados para "${query}"</div>`;
        }
        return `
            <div>
                <h1 class="text-2xl font-bold mb-4">Resultados para "${query}"</h1>
                <div class="grid-container">
                    ${results.map(ep => renderCard(ep)).join('')}

    // ========== ROUTER ==========
    const Router = {
        init() {
            document.addEventListener('click', e => {
                const link = e.target.closest('a');
                if (!link) return;
                const href = link.getAttribute('href');
                if (!href || href.startsWith('http') || href.startsWith('//') || href.startsWith('#')) return;
                e.preventDefault();
                this.navigate(href);
            });
            window.addEventListener('popstate', () => this.renderPath());
            this.renderPath();
        },
        navigate(path) {
            history.pushState({}, '', path);
            this.renderPath();
        },
        renderPath() {
            const path = window.location.pathname;
            const search = window.location.search;
            const main = document.getElementById('main-content');

            let content = '';
            let title = 'Balta Media';

            if (path === '/' || path === '') {
                content = renderFeed();
                title = 'Inicio | Balta Media';
            } else if (path === '/novedades') {
                content = renderNovedades();
                title = 'Novedades | Balta Media';
            } else if (path === '/biblioteca') {
                content = renderBiblioteca();
                title = 'Mi biblioteca | Balta Media';
            } else if (path === '/buscar') {
                if (search.includes('?q=')) {
                    const q = new URLSearchParams(search).get('q');
                    content = renderSearchResults(q);
                    title = `Resultados para "${q}" | Balta Media`;
                } else {
                    content = renderExplore();
                    title = 'Explorar | Balta Media';
                }
            } else if (path === '/app') {
                content = renderAppPage();
                title = 'Instalar app | Balta Media';
            } else {
                const serieEpisodes = DATA.filter(ep => ep.series && ep.series.url_serie === path);
                if (serieEpisodes.length) {
                    content = renderSerie(serieEpisodes);
                    title = `${serieEpisodes[0].series.titulo_serie} | Balta Media`;
                } else {
                    const episode = DATA.find(ep => ep.detailUrl === path);
                    if (episode) {
                        content = renderEpisode(episode);
                        title = `${episode.title} | Balta Media`;
                    } else {
                        content = renderNotFound();
                        title = '404 | Balta Media';
                    }
                }
            }

            main.innerHTML = content;
            document.title = title;
            updateActiveNav();
        }
    };

    function initSidebar() {
        const container = document.getElementById('sidebarContainer');
        if (window.innerWidth > 1023) {
            container.innerHTML = renderSidebar();
            const sidebar = document.getElementById('desktopSidebar');
            const toggle = document.getElementById('sidebarToggle');
            if (toggle) {
                toggle.addEventListener('click', () => {
                    const isCollapsed = sidebar.classList.contains('collapsed');
                    if (isCollapsed) {
                        sidebar.classList.remove('collapsed');
                        sidebar.classList.add('expanded');
                        document.body.style.marginLeft = '220px';
                    } else {
                        sidebar.classList.add('collapsed');
                        sidebar.classList.remove('expanded');
                        document.body.style.marginLeft = '70px';
                    }
                });
            }
            document.body.style.marginLeft = '70px';
        } else {
            container.innerHTML = '';
            document.body.style.marginLeft = '';
        }
    }

    // ========== BARRA DE CATEGORÍAS ==========
    function renderCategoryPills(active = 'Todos') {
        const categories = ['Todos', ...new Set(DATA.flatMap(ep => ep.categories))];
        const container = document.getElementById('categoryPills');
        container.innerHTML = categories.map(cat => `
            <button class="category-pill ${cat === active ? 'active' : ''}" data-cat="${cat}" onclick="filterByCategory('${cat}')">${cat}</button>
        `).join('');
    }

    function filterByCategory(cat) {
        if (cat === 'Todos') {
            Router.navigate('/');
        } else {
            Router.navigate('/categoria/' + encodeURIComponent(cat));
        }
    }

    // ========== ACTUALIZAR NAVEGACIÓN ACTIVA ==========
    function updateActiveNav() {
        const current = window.location.pathname;
        document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(link => {
            const href = link.getAttribute('href');
            if (href === current || (href === '/' && current === '/')) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    }

    // ========== BOTÓN DE USUARIO DINÁMICO ==========
    function updateUserButton() {
        const btn = document.getElementById('userActionBtn');
        if (!btn) return;
        const isInstalled = window.matchMedia('(display-mode: standalone)').matches;
        if (window.innerWidth < 1024 && !isInstalled) {
            // móvil no instalado → mostrar usuario que lleva a /app
            btn.innerHTML = '<img src="https://nikichitonjesus3.odoo.com/web/image/453-f4d8c1eb/user.png" class="w-full h-full object-cover">';
            btn.onclick = () => Router.navigate('/app');
        } else {
            // escritorio o móvil instalado → mostrar subir
            btn.innerHTML = '<img src="https://www.baltaanay.org/web/image/991-1c3c204a/subir.webp" class="w-full h-full object-cover">';
            btn.onclick = () => window.open('https://www.baltaanay.org/subir', '_blank');
        }
    }

    // ========== INICIALIZACIÓN ==========
    window.addEventListener('DOMContentLoaded', () => {
        renderCategoryPills();
        Router.init();
        initSidebar();
        updateUserButton();
        window.addEventListener('resize', () => {
            initSidebar();
            updateUserButton();
        });
    });

    // ========== SERVICE WORKER ==========
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(console.log);
        });
    }
</script>
</body>
</html>
