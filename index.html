<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Balta Media</title>
    <!-- Tailwind y fuentes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Iconos de Material (para búsqueda) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <!-- Manifest PWA -->
    <link rel="manifest" href="/manifest.json">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://media.baltaanay.org/web/image/885-f3d79ca9/xhbalta-aula.png">
    <meta name="theme-color" content="#050505">
    <style>
        /* ========== ESTILOS GLOBALES ========== */
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; overflow-x: hidden; margin: 0; transition: margin-left 0.3s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ========== BOTONES DE CARRUSEL ========== */
        .nav-btn {
            position: absolute; top: 0; bottom: 0; z-index: 40; width: 60px;
            display: none; align-items: center; justify-content: center;
            transition: opacity 0.3s;
        }
        .nav-btn.left { left: 0; background: linear-gradient(to right, #050505 0%, transparent 100%); }
        .nav-btn.right { right: 0; background: linear-gradient(to left, #050505 0%, transparent 100%); }
        .nav-btn button {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border-radius: 50%; width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.1);
            color: white; font-size: 20px; transition: transform 0.2s, background 0.2s;
        }
        .nav-btn button:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
        @media (min-width: 1024px) { .carousel-wrapper:hover .nav-btn { display: flex; } }

        /* ========== TARJETAS DEL FEED ========== */
        .card-std { min-width: 200px; width: 200px; display: flex; flex-direction: column; gap: 10px; cursor: pointer; position: relative; }
        .card-video {
            height: 220px; width: 220px; flex-shrink: 0; position: relative; overflow: hidden; border-radius: 12px;
            transition: width 0.5s cubic-bezier(0.25, 1, 0.5, 1); cursor: pointer;
        }
        @media (min-width: 1024px) { .card-video:hover { width: 390px; } }
        .card-list-group { min-width: 340px; display: flex; flex-direction: column; gap: 16px; }
        .list-item {
            display: flex; align-items: center; gap: 12px; padding: 8px 6px; border-radius: 8px;
            transition: background 0.2s; cursor: pointer; width: 100%;
        }
        .list-item:hover { background: rgba(255,255,255,0.08); }
        .list-item .item-content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .list-item .item-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        @media (max-width: 640px) {
            .list-item { flex-wrap: nowrap; }
            .list-item .item-actions button { width: 32px; height: 32px; padding: 0; }
        }

        /* ========== OVERLAYS ========== */
        .overlay-full {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px);
            opacity: 0; transition: opacity 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; border-radius: 12px;
        }
        .group:hover .overlay-full { opacity: 1; }
        .overlay-mini {
            position: absolute; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.2s;
            display: flex; align-items: center; justify-content: center; border-radius: 4px;
        }
        .list-item:hover .overlay-mini { opacity: 1; }
        .action-icon { width: 36px; height: 36px; transition: transform 0.2s, opacity 0.3s; cursor: pointer; pointer-events: auto; }
        .action-icon:hover { transform: scale(1.15); }
        .play-icon-lg { width: 56px; height: 56px; transition: transform 0.2s; cursor: pointer; pointer-events: auto; }
        .play-icon-lg:hover { transform: scale(1.1); }
        .play-icon-sm { width: 28px; height: 28px; pointer-events: auto; }

        /* ========== BÚSQUEDA DESKTOP ========== */
        .desktop-search-container { position: relative; }
        .desktop-search-results {
            position: absolute; top: 100%; left: 0; right: 0;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin-top: 8px; padding: 12px;
            max-height: 400px; overflow-y: auto; z-index: 1000; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .desktop-search-results.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .search-result-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .search-result-item:hover { background: rgba(255,255,255,0.1); }

        /* ========== BOTÓN PLAY MÓVIL ========== */
        .mobile-play-button {
            position: absolute; bottom: 8px; right: 8px; width: 32px; height: 32px;
            background: rgba(0,0,0,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            z-index: 30; pointer-events: auto;
        }
        .mobile-play-button img { width: 16px; height: 16px; filter: brightness(0) invert(1); }
        @media (min-width: 1024px) { .mobile-play-button { display: none; } }

        /* ========== BÚSQUEDA MÓVIL ========== */
        #mobileSearchBar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            transform: translateY(-100%); transition: transform 0.3s ease;
        }
        #mobileSearchBar.open { transform: translateY(0); }
        .search-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 9998;
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .search-overlay.active { opacity: 1; visibility: visible; }

        /* ========== BARRA LATERAL (ESCRITORIO) ========== */
        .desktop-sidebar {
            position: fixed; top: 0; left: 0; height: 100vh; background: #0F0F0F; color: #fff;
            z-index: 900; transition: width 0.3s ease; overflow-x: hidden; overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .desktop-sidebar::-webkit-scrollbar { display: none; }
        .desktop-sidebar.collapsed { width: 70px; }
        .desktop-sidebar.expanded { width: 15%; min-width: 180px; }
        @media (max-width: 768px) { .desktop-sidebar { display: none; } }
        .sidebar-toggle {
            display: flex; justify-content: flex-end; padding: 16px 12px; cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
        }
        .sidebar-toggle svg { width: 24px; height: 24px; fill: white; transition: transform 0.2s; }
        .desktop-sidebar.expanded .sidebar-toggle svg { transform: rotate(180deg); }
        .desktop-sidebar .nav-items { display: flex; flex-direction: column; gap: 8px; padding: 0 8px; margin-bottom: 30px; }
        .desktop-sidebar .nav-item {
            display: flex; align-items: center; gap: 12px; color: white; text-decoration: none;
            padding: 10px; border-radius: 8px; white-space: nowrap; transition: background 0.2s;
        }
        .desktop-sidebar .nav-item:hover { background: rgba(255,255,255,0.1); }
        .desktop-sidebar .nav-item.active { background: rgba(255,255,255,0.2); }
        .desktop-sidebar .nav-item img { width: 24px; height: 24px; filter: brightness(1.2); flex-shrink: 0; }
        .desktop-sidebar .nav-item span { font-size: 14px; font-weight: 500; transition: opacity 0.2s; }
        .desktop-sidebar.collapsed .nav-item span { display: none; }
        .desktop-sidebar.collapsed .rec-section { display: none; }
        .rec-section { padding: 0 8px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px; }
        .rec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .rec-header a { color: white; text-decoration: none; font-size: 14px; font-weight: 600; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .rec-list { display: flex; flex-direction: column; gap: 12px; }
        .rec-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .rec-item-info { flex: 1; min-width: 0; }
        .rec-item-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rec-item-author { font-size: 11px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rec-play-btn { background: none; border: none; color: white; cursor: pointer; padding: 4px 8px; border-radius: 4px; display: flex; }
        .rec-play-btn:hover { background: rgba(255,255,255,0.2); }
        .rec-play-btn svg { width: 18px; height: 18px; fill: white; }

        /* ========== BARRA INFERIOR MÓVIL ========== */
        .mobile-bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: #0F0F0F; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; padding: 10px 0; z-index: 950;
        }
        @media (min-width: 769px) { .mobile-bottom-bar { display: none; } }
        .mobile-bottom-bar a {
            display: flex; flex-direction: column; align-items: center; color: #aaa; text-decoration: none; font-size: 11px;
        }
        .mobile-bottom-bar a.active { color: white; }
        .mobile-bottom-bar img { width: 24px; height: 24px; filter: brightness(0.8); margin-bottom: 4px; }
        .mobile-bottom-bar a.active img { filter: brightness(1); }

        /* ========== MODAL PERSONALIZADO ========== */
        .custom-alert {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .custom-alert.active { opacity: 1; visibility: visible; }
        .alert-content {
            background: #1a1a1a; border-radius: 24px; padding: 30px; max-width: 400px; width: 90%;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .alert-title { color: #ff4444; font-weight: 800; font-size: 1.5rem; margin-bottom: 12px; }
        .alert-message { color: #ccc; line-height: 1.5; margin-bottom: 24px; }
        .alert-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        .alert-btn { padding: 10px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .alert-btn-primary { background: #ff4444; color: white; border: none; }
        .alert-btn-primary:hover { background: #cc0000; }
        .alert-btn-secondary { background: transparent; color: white; border: 1px solid #444; }
        .alert-btn-secondary:hover { background: #333; }

        /* ========== VISTA DE DETALLE ========== */
        #detail-view { margin-top: 2rem; min-height: 60vh; }
        .detail-404 { text-align: center; padding: 4rem 2rem; color: #aaa; }

        /* ========== GRID VIEW ========== */
        .grid-card { width: 100%; display: flex; flex-direction: column; gap: 10px; cursor: pointer; position: relative; }
        .grid-card .aspect-square { border-radius: 12px; overflow: hidden; position: relative; }

        /* ========== REPRODUCTOR UNIVERSAL (se posiciona automáticamente) ========== */
        .player-universal { transition: left 0.3s ease, width 0.3s ease !important; }
    </style>
</head>
<body>

        <div class="nav-items">

    <!-- ========== BARRA INFERIOR MÓVIL ========== -->

        <a href="/buscar" data-route="/buscar">

    <!-- ========== CABECERA SUPERIOR ========== -->

        <div class="max-w-[1600px] mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between" id="header-container">
            <a href="/" class="flex items-center gap-2" id="logo-link">
                <img src="https://media.baltaanay.org/web/image/885-f3d79ca9/xhbalta-aula.png" alt="Balta Media" class="w-6 h-6 sm:w-8 sm:h-8 rounded-lg object-cover">
                <span class="text-lg sm:text-xl font-bold text-white">Media</span>
            </a>

            <!-- Buscador desktop -->
            <div class="hidden lg:flex items-center gap-4 desktop-search-container">
                <div class="relative">
                    <input type="text" id="desktopSearch" placeholder="Buscar episodios, series..." class="bg-white/10 border border-white/20 rounded-full px-4 py-2 pl-10 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="handleDesktopSearchInput(this.value)" onkeypress="if(event.key === 'Enter') handleDesktopSearchEnter(event)" onfocus="showDesktopSearchResults()">

    <script>
        // ==================== CONFIGURACIÓN GLOBAL ====================
        const ICONS = {
            play: 'https://marca1.odoo.com/web/image/508-f876320c/play.svg',
            add: 'https://marca1.odoo.com/web/image/509-c555b4ef/a%C3%B1adir%20a.svg',

            dl: 'https://marca1.odoo.com/web/image/510-7a9035c1/descargar.svg',
            noDl: 'https://nikichitonjesus.odoo.com/web/image/1051-622a3db3/no-desc.webp',
            remove: 'https://nikichitonjesus.odoo.com/web/image/811-8a809533/remove.png',
            share: 'https://marca1.odoo.com/web/image/511-3d2d2e2c/compartir.svg'
        };

        const CATEGORIES = [
            "Todos",
            "Derecho",
            "Física y Astronomía",
            "Matemáticas",
            "Historia",
            "Filosofía",
            "Economía y Finanzas",
            "Ciencias Sociales",
            "Arte y Cultura",
            "Literatura y Audiolibros",
            "Cine y TV",
            "Documentales",
            "Ciencias Naturales",
            "Tecnología e Informática",
            "Otras Ciencias"
        ];

        // Procesar episodios (usando la función de episodios.js si existe)
        let DATA = [];
        if (typeof window.processEpisodes === 'function') {
            DATA = window.processEpisodes();
        } else {
            // Fallback: si no existe, procesar manualmente (por si acaso)
            if (window.USER_EPISODES) {
                DATA = window.USER_EPISODES.map((ep, i) => ({
                    id: i,
                    slug: ep.detailUrl?.split('/').pop() || `ep-${i}`,
                    title: ep.title,
                    author: ep.author || ep.series?.titulo_serie || 'Conferencias Académicas',
                    categories: window.determineCategories ? window.determineCategories(ep) : [],
                    cover: ep.coverUrl,
                    coverWide: ep.coverUrl2 || ep.coverUrl,
                    mediaUrl: ep.mediaUrl,
                    type: ep.type,
                    description: (ep.description || '') + ' ' + (ep.series?.descripcion_serie || ''),
                    allowDownload: ep.allowDownload !== undefined ? ep.allowDownload : true,
                    detailUrl: ep.detailUrl,
                    date: ep.date,
                    series: ep.series
                }));
            }
        }

        // ==================== PLAYLIST ====================
        const playlistKey = 'streamhub_userPlaylist';
        let userPlaylist = JSON.parse(localStorage.getItem(playlistKey)) || [];

        function isInPlaylist(mediaUrl) {
            return userPlaylist.some(item => item.mediaUrl === mediaUrl);
        }

        function savePlaylist() {
            localStorage.setItem(playlistKey, JSON.stringify(userPlaylist));
        }

        function addToUserPlaylist(episodeData) {
            if (!episodeData || !episodeData.mediaUrl) return false;
            const exists = userPlaylist.some(item => item.mediaUrl === episodeData.mediaUrl);
            if (!exists) {
                const playlistItem = {
                    mediaUrl: episodeData.mediaUrl,
                    mediaType: episodeData.type || episodeData.mediaType || 'audio',
                    coverUrlContainer: episodeData.cover || episodeData.coverUrlContainer || episodeData.coverUrl,
                    coverUrlInfo: episodeData.cover || episodeData.coverUrlInfo || episodeData.coverUrl,
                    title: episodeData.title,
                    detailUrl: episodeData.detailUrl || '#',
                    author: episodeData.author || 'Desconocido',
                    next: [],
                    text: episodeData.description || '',
                    allowDownload: episodeData.allowDownload !== undefined ? episodeData.allowDownload : true
                };
                userPlaylist.push(playlistItem);
                savePlaylist();
                updateAllAddButtons(episodeData.mediaUrl);
                return true;
            }
            return false;
        }

        function removeFromUserPlaylist(mediaUrl) {
            userPlaylist = userPlaylist.filter(item => item.mediaUrl !== mediaUrl);
            savePlaylist();
            updateAllAddButtons(mediaUrl);
        }

        function togglePlaylist(episodeData) {
            if (isInPlaylist(episodeData.mediaUrl)) {
                removeFromUserPlaylist(episodeData.mediaUrl);
            } else {
                addToUserPlaylist(episodeData);
            }
        }

        function updateAllAddButtons(mediaUrl) {
            const isAdded = isInPlaylist(mediaUrl);
            const newIcon = isAdded ? ICONS.added : ICONS.add;
            document.querySelectorAll(`[data-mediaurl="${mediaUrl}"]`).forEach(el => {
                if (el.tagName === 'IMG') {
                    el.src = newIcon;
                    el.dataset.added = isAdded;
                } else {
                    const img = el.querySelector('img');
                    if (img && (img.src.includes(ICONS.add) || img.src.includes(ICONS.added))) {
                        img.src = newIcon;
                        img.dataset.added = isAdded;
                    }
                    el.dataset.added = isAdded;
                }
            });
        }

        // ==================== HISTORIAL (para biblioteca) ====================
        const historyKey = 'streamhub_history';
        let userHistory = JSON.parse(localStorage.getItem(historyKey)) || [];

        function addToHistory(episodeData) {
            if (!episodeData || !episodeData.mediaUrl) return;
            userHistory = userHistory.filter(item => item.mediaUrl !== episodeData.mediaUrl);
            userHistory.unshift(episodeData);
            if (userHistory.length > 50) userHistory.pop();
            localStorage.setItem(historyKey, JSON.stringify(userHistory));
        }

        // ==================== LIKES (para biblioteca) ====================
        const likesKey = 'streamhub_likes';
        let userLikes = JSON.parse(localStorage.getItem(likesKey)) || [];

        function toggleLike(episodeData) {
            const exists = userLikes.some(item => item.mediaUrl === episodeData.mediaUrl);
            if (exists) {
                userLikes = userLikes.filter(item => item.mediaUrl !== episodeData.mediaUrl);
            } else {
                userLikes.push(episodeData);
            }
            localStorage.setItem(likesKey, JSON.stringify(userLikes));
        }

        // ==================== MODAL PERSONALIZADO ====================
        let alertActionCallback = null;
        function showAlert(title, message, actionText = 'Reportar problema', actionUrl = 'https://www.baltaanay.org/contactus/') {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMessage').innerText = message;
            document.getElementById('alertActionBtn').innerText = actionText;
            alertActionCallback = () => { window.open(actionUrl, '_blank'); };
            document.getElementById('customAlert').classList.add('active');
        }
        function closeAlert() {
            document.getElementById('customAlert').classList.remove('active');
        }
        function handleAlertAction() {
            if (alertActionCallback) alertActionCallback();
            closeAlert();
        }

        // ==================== REPRODUCTOR UNIFICADO ====================
        function playEpisode(ep, list = []) {
            if (!ep) return;
            // Añadir al historial
            addToHistory({
                mediaUrl: ep.mediaUrl,
                type: ep.type,
                cover: ep.cover,
                title: ep.title,
                detailUrl: ep.detailUrl,
                author: ep.author,
                description: ep.description,
                allowDownload: ep.allowDownload
            });

            if (typeof window.playEpisodeExpanded === 'function') {
                try {
                    window.playEpisodeExpanded(
                        ep.mediaUrl,
                        ep.type || 'audio',
                        ep.cover || ep.coverUrl,
                        ep.coverWide || ep.cover || ep.coverUrl,
                        ep.title,
                        ep.detailUrl,
                        ep.author,
                        list,
                        ep.description || '',
                        ep.allowDownload !== false
                    );
                } catch (e) {
                    showAlert('Error de reproducción', `El episodio "${ep.title}" no está disponible.`, 'Reportar problema');
                }
            } else {
                showAlert('Reproductor no disponible', 'El reproductor externo no está cargado. Intenta más tarde.', 'Reportar problema');
            }
        }

        // ==================== DESCARGA ====================
        function downloadEpisode(ep) {
            if (!ep) return;
            if (ep.allowDownload === false) {
                showAlert('Descarga no disponible', `El episodio "${ep.title}" no permite descarga.`, 'Solicitar', 'https://www.baltaanay.org/contactus/');
                return;
            }
            const ext = ep.type === 'video' ? 'mp4' : 'mp3';
            const filename = `${ep.title.replace(/[^a-z0-9]/gi, '_').substring(0, 50)}.${ext}`;
            try {
                const a = document.createElement('a');
                a.href = ep.mediaUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                // Si falla por CORS, abrir en nueva pestaña
                setTimeout(() => {
                    if (!a.href.startsWith('blob:')) {
                        window.open(ep.mediaUrl, '_blank');
                    }
                }, 1000);
            } catch (error) {
                window.open(ep.mediaUrl, '_blank');
            }
        }

        // ==================== DETECCIÓN DE INSTALACIÓN PWA ====================
        function isAppInstalled() {
            return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        }

        function updateUserIcons() {
            const isMobile = window.innerWidth < 768;
            const installed = isAppInstalled();
            // Desktop siempre subir
            if (!isMobile) {
                document.getElementById('userActionLink').href = 'https://www.baltaanay.org/subir';
                document.getElementById('userActionIcon').src = 'https://www.baltaanay.org/web/image/991-1c3c204a/subir.webp';
                document.getElementById('userActionText').innerText = 'Subir';
                document.getElementById('mobileUserActionLink').href = 'https://www.baltaanay.org/subir';
                document.getElementById('mobileUserActionIcon').src = 'https://www.baltaanay.org/web/image/991-1c3c204a/subir.webp';
            } else {
                // Móvil
                if (installed) {
                    document.getElementById('mobileUserActionLink').href = 'https://www.baltaanay.org/subir';
                    document.getElementById('mobileUserActionIcon').src = 'https://www.baltaanay.org/web/image/991-1c3c204a/subir.webp';
                    document.getElementById('userActionLink').href = 'https://www.baltaanay.org/subir';
                    document.getElementById('userActionIcon').src = 'https://www.baltaanay.org/web/image/991-1c3c204a/subir.webp';
                    document.getElementById('userActionText').innerText = 'Subir';
                } else {
                    document.getElementById('mobileUserActionLink').href = '/app';
                    document.getElementById('mobileUserActionIcon').src = 'https://nikichitonjesus.odoo.com/web/image/1051-622a3db3/no-desc.webp';
                    document.getElementById('userActionLink').href = '/app';
                    document.getElementById('userActionIcon').src = 'https://nikichitonjesus.odoo.com/web/image/1051-622a3db3/no-desc.webp';
                    document.getElementById('userActionText').innerText = 'Instalar';
                }
            }
        }

        // ==================== ROUTER SPA ====================
        const Router = {
            init() {
                document.addEventListener('click', (e) => {
                    const link = e.target.closest('a');
                    if (!link) return;
                    const href = link.getAttribute('href');
                    if (!href) return;
                    if (href.startsWith('http') || href.startsWith('//') || href.startsWith('#')) return;
                    e.preventDefault();
                    this.navigate(href);
                });
                window.addEventListener('popstate', () => {
                    this.renderPath(window.location.pathname + window.location.search);
                });
                this.renderPath(window.location.pathname + window.location.search);
            },

            navigate(path) {
                history.pushState({}, '', path);
                this.renderPath(path);
                // Actualizar barra inferior activa
                document.querySelectorAll('.mobile-bottom-bar a').forEach(a => {
                    a.classList.toggle('active', a.getAttribute('href') === path);
                });
                // Actualizar sidebar activa
                document.querySelectorAll('.desktop-sidebar .nav-item').forEach(a => {
                    const href = a.getAttribute('href');
                    a.classList.toggle('active', href === path);
                });
            },

            renderPath(fullPath) {
                const [path, query] = fullPath.split('?');
                const params = new URLSearchParams(query);

                // Ocultar todas las vistas
                document.getElementById('feed-view').classList.add('hidden');
                document.getElementById('grid-view').classList.add('hidden');
                document.getElementById('detail-view').classList.add('hidden');
                document.getElementById('page-view').classList.add('hidden');

                // Mostrar/ocultar cabecera superior y filtros (ocultar en /buscar)
                const header = document.getElementById('top-header');
                const categoryFilters = document.getElementById('category-filters');
                if (path === '/buscar' || path.startsWith('/buscar?')) {
                    header.style.display = 'none';
                    categoryFilters.style.display = 'none';
                } else {
                    header.style.display = 'block';
                    categoryFilters.style.display = 'block';
                }

                // Ruta raíz
                if (path === '/' || path === '') {
                    document.getElementById('feed-view').classList.remove('hidden');
                    document.title = 'Balta Media';
                    return;
                }

                // Páginas que cargamos desde /paginas/
                const pageScripts = {
                    '/buscar': '/paginas/buscar.js',
                    '/biblioteca': '/paginas/biblioteca.js',
                    '/novedades': '/paginas/novedades.js',
                    '/app': '/paginas/app.js'  // app.js puede ser un script simple que renderiza la página de instalación
                };

                if (pageScripts[path]) {
                    this.loadPageScript(pageScripts[path], path);
                    return;
                }

                // Categoría (usamos grid view interno)
                if (path.startsWith('/categoria/')) {
                    const cat = decodeURIComponent(path.replace('/categoria/', ''));
                    document.getElementById('grid-view').classList.remove('hidden');
                    document.title = `${cat} | Balta Media`;
                    this.renderCategoryView(cat);
                    return;
                }

                // Serie (buscamos por url_serie)
                const seriesEpisodes = DATA.filter(ep => ep.series && ep.series.url_serie === path);
                if (seriesEpisodes.length > 0) {
                    document.getElementById('detail-view').classList.remove('hidden');
                    document.title = `${seriesEpisodes[0].series.titulo_serie} | Balta Media`;
                    this.renderSeriesWidget(seriesEpisodes);
                    return;
                }

                // Episodio (detailUrl)
                const episode = DATA.find(ep => ep.detailUrl === path);
                if (episode) {
                    document.getElementById('detail-view').classList.remove('hidden');
                    document.title = `${episode.title} | Balta Media`;
                    this.renderEpisodeWidget(episode);
                    return;
                }

                // 404
                document.title = 'Página no encontrada | Balta Media';
                document.getElementById('detail-view').classList.remove('hidden');
                document.getElementById('detail-view').innerHTML = `
                    <div class="detail-404">
                        <h2 class="text-3xl sm:text-4xl font-bold mb-4">404</h2>
                        <p class="text-lg sm:text-xl">Este contenido no está disponible</p>
                    </div>
                `;
            },

            loadPageScript(scriptUrl, path) {
                // Cargar script dinámicamente si no está ya cargado
                const scriptId = 'page-script-' + path.replace(/\//g, '-');
                if (!document.getElementById(scriptId)) {
                    const script = document.createElement('script');
                    script.id = scriptId;
                    script.src = scriptUrl;
                    script.onload = () => {
                        document.getElementById('page-view').classList.remove('hidden');
                        // Si el script expone una función init, llamarla
                        if (window.pageScript && window.pageScript.init) {
                            window.pageScript.init();
                        }
                    };
                    script.onerror = () => {
                        document.getElementById('page-view').innerHTML = '<div class="detail-404"><h2>Error al cargar la página</h2></div>';
                        document.getElementById('page-view').classList.remove('hidden');
                    };
                    document.body.appendChild(script);
                } else {
                    document.getElementById('page-view').classList.remove('hidden');
                    if (window.pageScript && window.pageScript.init) {
                        window.pageScript.init();
                    }
                }
            },

            renderCategoryView(cat) {
                const results = DATA.filter(ep => ep.categories.includes(cat));
                this.renderGrid(results, cat);
            },

            renderGrid(items, title) {
                const gridContainer = document.getElementById('results-grid');
                const emptyState = document.getElementById('empty-state');
                const titleEl = document.getElementById('grid-title');
                titleEl.innerText = title;
                gridContainer.innerHTML = '';

                if (items.length === 0) {
                    emptyState.classList.remove('hidden');
                    gridContainer.classList.add('hidden');
                    document.getElementById('empty-msg').innerText = `No hay episodios en la categoría "${title}"`;
                    const suggestions = [...DATA].sort(() => 0.5 - Math.random()).slice(0, 5);
                    const recGrid = document.getElementById('recommendations-grid');
                    recGrid.innerHTML = '';
                    suggestions.forEach(ep => recGrid.innerHTML += this.createGridCard(ep));
                } else {
                    emptyState.classList.add('hidden');
                    gridContainer.classList.remove('hidden');
                    items.forEach(item => {
                        gridContainer.innerHTML += this.createGridCard(item);
                    });
                }
            },

            createGridCard(item) {
                const isInPlaylistItem = isInPlaylist(item.mediaUrl);
                const addIcon = isInPlaylistItem ? ICONS.added : ICONS.add;
                const dlIcon = item.allowDownload ? ICONS.dl : ICONS.noDl;
                return `
                    <div class="grid-card group">
                        <div class="aspect-square bg-zinc-800 relative" onclick="goToDetail('${item.detailUrl}')">
                            <img src="${item.cover}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                            <div class="overlay-full">
                                <img src="${addIcon}" class="action-icon" onclick="handleAdd(event, '${item.mediaUrl}'); return false;" 
                                     data-mediaurl="${item.mediaUrl}" data-added="${isInPlaylistItem}">
                                <img src="${ICONS.play}" class="play-icon-lg" onclick="handlePlay(event, '${item.mediaUrl}'); return false;">
                                <img src="${dlIcon}" class="action-icon" onclick="handleDl(event, '${item.mediaUrl}'); return false;" 
                                     title="${item.allowDownload ? 'Descargar' : 'Descarga no disponible'}">
                            </div>
                            <div class="mobile-play-button" onclick="handlePlay(event, '${item.mediaUrl}'); return false;">
                                <img src="${ICONS.play}" alt="Play">
                            </div>
                        </div>
                        <div onclick="goToDetail('${item.detailUrl}')">
                            <h4 class="font-bold text-sm text-white truncate">${item.title}</h4>
                            <p class="text-xs text-gray-500 truncate">${item.author}</p>
                        </div>
                    </div>
                `;
            },

            renderSeriesWidget(episodes) {
                // Implementación básica - puedes ampliarla después
                const series = episodes[0].series;
                let html = `<h1 class="text-2xl font-bold">${series.titulo_serie}</h1>`;
                html += '<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-6">';
                episodes.forEach(ep => {
                    html += this.createGridCard(ep);
                });
                html += '</div>';
                document.getElementById('detail-view').innerHTML = html;
            },

            renderEpisodeWidget(episode) {
                let html = `<h1 class="text-2xl font-bold">${episode.title}</h1>`;
                html += `<p class="text-gray-400 mt-2">${episode.author}</p>`;
                html += `<p class="mt-4">${episode.description}</p>`;
                document.getElementById('detail-view').innerHTML = html;
            }
        };

        // ==================== FUNCIONES DEL FEED (adaptadas del código original) ====================
        function renderCategoryPills(activeCat = 'Todos') {
            const container = document.getElementById('category-pills');
            if (!container) return;
            container.innerHTML = '';
            CATEGORIES.forEach(cat => {
                const isActive = cat === activeCat;
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-3 sm:px-4 py-1 sm:py-1.5 rounded-full text-xs font-bold transition-all ${isActive ? 'bg-white text-black' : 'bg-white/10 text-gray-300 hover:bg-white/20'}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    if (cat === 'Todos') {
                        Router.navigate('/');
                    } else {
                        Router.navigate('/categoria/' + encodeURIComponent(cat));
                    }
                };
                container.appendChild(btn);
            });
        }

        function createStandardCard(ep) {
            const isInPlaylistItem = isInPlaylist(ep.mediaUrl);
            const addIcon = isInPlaylistItem ? ICONS.added : ICONS.add;
            const dlIcon = ep.allowDownload ? ICONS.dl : ICONS.noDl;
            return `<div class="card-std group">
                <div class="relative w-full aspect-square rounded-xl overflow-hidden bg-zinc-800" onclick="goToDetail('${ep.detailUrl}')">
                    <img src="${ep.cover}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    <div class="overlay-full">
                        <img src="${addIcon}" class="action-icon" onclick="handleAdd(event, '${ep.mediaUrl}'); return false;" 
                             data-mediaurl="${ep.mediaUrl}" data-added="${isInPlaylistItem}">
                        <img src="${ICONS.play}" class="play-icon-lg" onclick="handlePlay(event, '${ep.mediaUrl}'); return false;">
                        <img src="${dlIcon}" class="action-icon" onclick="handleDl(event, '${ep.mediaUrl}'); return false;" 
                             title="${ep.allowDownload ? 'Descargar' : 'Descarga no disponible'}">
                    </div>
                    <div class="mobile-play-button" onclick="handlePlay(event, '${ep.mediaUrl}'); return false;">

        function createVideoExpand(ep) {
            const isInPlaylistItem = isInPlaylist(ep.mediaUrl);
            const addIcon = isInPlaylistItem ? ICONS.added : ICONS.add;
            const dlIcon = ep.allowDownload ? ICONS.dl : ICONS.noDl;

                <img src="${ep.cover}" class="absolute inset-0 w-full h-full object-cover z-10 group-hover:opacity-0 transition-opacity duration-300">

                    <img src="${addIcon}" class="action-icon" onclick="handleAdd(event, '${ep.mediaUrl}'); return false;" 
                         data-mediaurl="${ep.mediaUrl}" data-added="${isInPlaylistItem}">
                    <img src="${ICONS.play}" class="play-icon-lg" onclick="handlePlay(event, '${ep.mediaUrl}'); return false;">
                    <img src="${dlIcon}" class="action-icon" onclick="handleDl(event, '${ep.mediaUrl}'); return false;" 
                         title="${ep.allowDownload ? 'Descargar' : 'Descarga no disponible'}">
                </div>
                <div class="mobile-play-button z-30" onclick="handlePlay(event, '${ep.mediaUrl}'); return false;">

                </div>
                <div class="absolute bottom-2 left-2 z-20 bg-black/60 px-2 py-0.5 rounded text-[10px] font-bold">VIDEO</div>
            </div>`;
        }

        function createListItem(ep, idx) {
            const isInPlaylistItem = isInPlaylist(ep.mediaUrl);
            const addIcon = isInPlaylistItem ? ICONS.added : ICONS.add;
            return `<div class="list-item group">
                <span class="text-gray-500 font-bold w-4 text-center text-sm flex-shrink-0">${idx + 1}</span>
                <div class="relative w-12 h-12 sm:w-14 sm:h-14 flex-shrink-0 rounded overflow-hidden" onclick="goToDetail('${ep.detailUrl}')">
                    <img src="${ep.cover}" class="w-full h-full object-cover">
                    <div class="overlay-mini" onclick="handlePlay(event, '${ep.mediaUrl}'); return false;"><img src="${ICONS.play}" class="play-icon-sm"></div>
                </div>
                <div class="item-content" onclick="goToDetail('${ep.detailUrl}')">
                    <h4 class="font-bold text-sm truncate text-white">${ep.title}</h4>
                    <p class="text-xs text-gray-500 truncate">${ep.author}</p>
                </div>
                <div class="item-actions">
                    <button class="lg:opacity-0 lg:group-hover:opacity-100 transition-opacity" onclick="handleAdd(event, '${ep.mediaUrl}'); return false;">
                        <img src="${addIcon}" alt="Agregar" class="w-5 h-5" data-mediaurl="${ep.mediaUrl}" data-added="${isInPlaylistItem}">
                    </button>
                    <div class="lg:hidden mobile-play-button" style="position: static; width: 32px; height: 32px;" onclick="handlePlay(event, '${ep.mediaUrl}'); return false;">
                        <img src="${ICONS.play}" alt="Play" class="w-4 h-4">
                    </div>
                </div>
            </div>`;
        }

        function createCarousel(title, type, items, categoryContext) {
            if (!items || items.length === 0) return '';
            const id = 'c-' + Math.random().toString(36).substr(2, 9);
            let content = '';
            if (type === 'double') {
                content = `<div id="${id}" class="flex flex-col flex-wrap h-[580px] gap-x-6 gap-y-6 overflow-x-auto no-scrollbar scroll-smooth">` + items.map(ep => createStandardCard(ep)).join('') + `</div>`;
            } else if (type === 'list') {
                content = `<div id="${id}" class="flex gap-4 sm:gap-8 overflow-x-auto no-scrollbar scroll-smooth pb-4">`;
                for (let i = 0; i < items.length; i += 4) {
                    content += `<div class="card-list-group min-w-[300px] sm:min-w-[340px]">` +
                        (items[i] ? createListItem(items[i], i) : '') +
                        (items[i+1] ? createListItem(items[i+1], i+1) : '') +
                        (items[i+2] ? createListItem(items[i+2], i+2) : '') +
                        (items[i+3] ? createListItem(items[i+3], i+3) : '') +
                        `</div>`;
                }
                content += `</div>`;
            } else if (type === 'expand') {
                content = `<div id="${id}" class="flex gap-3 sm:gap-4 overflow-x-auto no-scrollbar scroll-smooth py-2 pl-1">` + items.map(ep => createVideoExpand(ep)).join('') + `</div>`;
            } else {
                content = `<div id="${id}" class="flex gap-4 sm:gap-6 overflow-x-auto no-scrollbar scroll-smooth py-2 pl-1">` + items.map(ep => createStandardCard(ep)).join('') + `</div>`;
            }
            return `<section class="carousel-wrapper relative group/section mb-8 sm:mb-12">
                <div class="flex items-end justify-between mb-3 sm:mb-5 px-1">
                    <h2 class="text-xl sm:text-2xl font-bold tracking-tight text-white hover:text-blue-500 transition-colors">${title}</h2>
                    <button onclick="Router.navigate('/categoria/${encodeURIComponent(categoryContext)}')" class="text-xs font-bold text-gray-500 uppercase tracking-wider hover:text-white">Ver todo</button>
                </div>
                <div class="relative">
                    <div class="nav-btn left" onclick="document.getElementById('${id}').scrollLeft -= 600"><button>❮</button></div>
                    ${content}
                    <div class="nav-btn right" onclick="document.getElementById('${id}').scrollLeft += 600"><button>❯</button></div>
                </div>
            </section>`;
        }

        function createSeriesCarousel() {
            const id = 'c-series-' + Math.random().toString(36).substr(2, 9);
            const seriesGroups = {};
            DATA.forEach(ep => {
                if (ep.series && ep.series.titulo_serie) {
                    const serieKey = ep.series.titulo_serie;
                    if (!seriesGroups[serieKey]) {
                        seriesGroups[serieKey] = {episodes: [], seriesInfo: ep.series};
                    }
                    seriesGroups[serieKey].episodes.push(ep);
                }
            });
            const seriesKeys = Object.keys(seriesGroups);
            if (seriesKeys.length === 0) return '';
            let content = `<div id="${id}" class="flex gap-4 sm:gap-8 overflow-x-auto no-scrollbar scroll-smooth pb-4">`;
            seriesKeys.forEach(serieKey => {
                let group = seriesGroups[serieKey];
                group.episodes.sort((a, b) => new Date(b.date) - new Date(a.date));
                const s = group.seriesInfo;
                if (!s || group.episodes.length < 1) return;
                content += `<div class="card-list-group min-w-[300px] sm:min-w-[340px]">
                    <div class="mb-4 cursor-pointer" onclick="goToDetail('${s.url_serie}')">
                        <div class="relative w-full aspect-square rounded-xl overflow-hidden bg-zinc-800">
                            <img src="${s.portada_serie}" class="w-full h-full object-cover">
                        </div>
                        <h3 class="font-bold text-white text-sm truncate mt-2">${s.titulo_serie}</h3>
                        <p class="text-xs text-gray-400">ver serie</p>
                    </div>`;
                group.episodes.slice(0, 4).forEach((ep, i) => {
                    content += createListItem(ep, i);
                });
                content += `</div>`;
            });
            content += `</div>`;
            return `<section class="carousel-wrapper relative group/section mb-8 sm:mb-12">
                <div class="flex items-end justify-between mb-3 sm:mb-5 px-1">
                    <h2 class="text-xl sm:text-2xl font-bold tracking-tight text-white hover:text-blue-500 transition-colors">Series y Cursos Académicos</h2>
                    <button class="text-xs font-bold text-gray-500 uppercase tracking-wider hover:text-white">Ver todo</button>
                </div>
                <div class="relative">
                    <div class="nav-btn left" onclick="document.getElementById('${id}').scrollLeft -= 600"><button>❮</button></div>
                    ${content}
                    <div class="nav-btn right" onclick="document.getElementById('${id}').scrollLeft += 600"><button>❯</button></div>
                </div>
            </section>`;
        }

        function initFeed() {
            if (!DATA || DATA.length === 0) {
                document.getElementById('feed-view').innerHTML = '<div class="text-center py-20"><p class="text-gray-400 text-lg">No hay contenido disponible en este momento.</p></div>';
                return;
            }
            renderCategoryPills();
            const feed = document.getElementById('feed-view');
            const getRandomSafe = (count, filterFn = () => true) => {
                const filtered = DATA.filter(filterFn);
                if (filtered.length === 0) return [];
                const shuffled = [...filtered].sort(() => 0.5 - Math.random());
                return shuffled.slice(0, Math.min(count, shuffled.length));
            };
            feed.innerHTML = '';
            feed.innerHTML += createCarousel("Nuevos Lanzamientos", "standard", getRandomSafe(15, ep => new Date(ep.date) > new Date(Date.now() - 30*24*60*60*1000)), "Todos");
            feed.innerHTML += createCarousel("Series de Video", "expand", getRandomSafe(10, e => e.type === 'video'), "Cine y TV");
            feed.innerHTML += createCarousel("Top Semanal", "list", getRandomSafe(16), "Todos");
            feed.innerHTML += createCarousel("Para Estudiar Profundamente", "double", getRandomSafe(20, e => e.categories.includes("Matemáticas") || e.categories.includes("Física y Astronomía")), "Matemáticas");
            feed.innerHTML += createCarousel("Matemáticas", "standard", getRandomSafe(15, e => e.categories.includes("Matemáticas")), "Matemáticas");
            feed.innerHTML += createCarousel("Especiales en Video", "expand", getRandomSafe(10, e => e.type === 'video' && e.categories.includes("Documentales")), "Documentales");
            feed.innerHTML += createCarousel("Física y Astronomía", "standard", getRandomSafe(15, e => e.categories.includes("Física y Astronomía")), "Física y Astronomía");
            feed.innerHTML += createCarousel("Ciencias Naturales y Tecnología", "double", getRandomSafe(20, e => e.categories.some(c => ["Ciencias Naturales", "Tecnología e Informática"].includes(c))), "Otras Ciencias");
            feed.innerHTML += createSeriesCarousel();
            feed.innerHTML += createCarousel("Otras Ciencias y Disciplinas", "standard", getRandomSafe(15, e => e.categories.includes("Otras Ciencias") || e.categories.some(c => ["Ciencias Naturales", "Tecnología e Informática"].includes(c))), "Otras Ciencias");
        }

        // ==================== HANDLERS GLOBALES ====================
        window.handlePlay = function(e, mediaUrl) {
            e.stopPropagation();
            e.preventDefault();
            const ep = DATA.find(x => x.mediaUrl === mediaUrl);
            if (ep) playEpisode(ep);
            return false;
        };

        window.handleAdd = function(e, mediaUrl) {
            e.stopPropagation();
            e.preventDefault();
            const ep = DATA.find(x => x.mediaUrl === mediaUrl);
            if (ep) togglePlaylist(ep);
            return false;
        };

        window.handleDl = function(e, mediaUrl) {
            e.stopPropagation();
            e.preventDefault();
            const ep = DATA.find(x => x.mediaUrl === mediaUrl);
            if (ep) downloadEpisode(ep);
            return false;
        };

        window.goToDetail = function(url) {
            if (url && url !== '#') Router.navigate(url);
        };

        // ==================== BÚSQUEDA (funciones del header) ====================
        let searchTimeout = null;
        function showDesktopSearchResults() { document.getElementById('desktopSearchResults').classList.add('active'); }
        function hideDesktopSearchResults() { setTimeout(() => document.getElementById('desktopSearchResults').classList.remove('active'), 200); }
        function handleDesktopSearchInput(query) {
            clearTimeout(searchTimeout);
            if (!query || query.trim() === '') { clearDesktopSearchResults(); return; }
            searchTimeout = setTimeout(() => {
                const results = performQuickSearch(query);
                renderDesktopSearchResults(results, query);
            }, 300);
        }
        function handleDesktopSearchEnter(event) {
            event.preventDefault();
            const query = document.getElementById('desktopSearch').value.trim();
            if (query) {
                Router.navigate('/buscar?q=' + encodeURIComponent(query));
                hideDesktopSearchResults();
            }
        }
        function performQuickSearch(query) {
            const term = query.toLowerCase().trim();
            return DATA.filter(ep =>
                ep.title.toLowerCase().includes(term) ||
                ep.author.toLowerCase().includes(term) ||
                ep.categories.some(c => c.toLowerCase().includes(term)) ||
                ep.description.toLowerCase().includes(term)
            ).slice(0, 5);
        }
        function renderDesktopSearchResults(results, query) {
            const container = document.getElementById('desktopSearchResultsContent');
            if (!container) return;
            if (results.length === 0) {
                container.innerHTML = `<div class="text-center py-4 text-gray-400"><p>No encontramos resultados para "${query}"</p></div>`;
                return;
            }
            container.innerHTML = results.map(ep => `
                <div class="search-result-item" onclick="goToDetail('${ep.detailUrl}'); event.stopPropagation();">
                    <div class="w-12 h-12 rounded-md overflow-hidden flex-shrink-0">
                        <img src="${ep.cover}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-sm text-white truncate">${ep.title}</h4>
                        <p class="text-xs text-gray-400 truncate">${ep.author} • ${ep.type === 'video' ? 'Video' : 'Audio'}</p>
                    </div>
                </div>
            `).join('');
            container.innerHTML += `
                <div class="search-result-item mt-2 border-t border-white/10 pt-2" onclick="Router.navigate('/buscar?q='+encodeURIComponent('${query}'))">
                    <div class="flex items-center justify-center w-full">
                        <span class="text-blue-400 font-bold text-sm">Ver todos los resultados para "${query}"</span>
                    </div>
                </div>
            `;
        }
        function clearDesktopSearchResults() {
            document.getElementById('desktopSearchResultsContent').innerHTML = '';
            document.getElementById('desktopSearchResults').classList.remove('active');
        }
        function handleMobileSearchInput(query) {
            clearTimeout(searchTimeout);
            if (!query || query.trim() === '') { clearMobileSearchResults(); return; }
            searchTimeout = setTimeout(() => {
                const results = performQuickSearch(query);
                renderMobileSearchResults(results, query);
            }, 300);
        }
        function handleMobileSearchEnter(event) {
            event.preventDefault();
            const query = document.getElementById('mobileSearchInput').value.trim();
            if (query) handleMobileSearch(query);
        }
        function handleMobileSearchButton() {
            const query = document.getElementById('mobileSearchInput').value.trim();
            if (query) handleMobileSearch(query);
        }
        function renderMobileSearchResults(results, query) {
            const container = document.getElementById('mobileSearchResults');
            if (!container) return;
            if (results.length === 0) {
                container.innerHTML = `<div class="text-center py-4 text-gray-400"><p>No encontramos resultados para "${query}"</p></div>`;
                return;
            }
            container.innerHTML = results.map(ep => `
                <div class="search-result-item" onclick="goToDetail('${ep.detailUrl}'); closeSearch();">
                    <div class="w-12 h-12 rounded-md overflow-hidden flex-shrink-0">
                        <img src="${ep.cover}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-sm text-white truncate">${ep.title}</h4>
                        <p class="text-xs text-gray-400 truncate">${ep.author} • ${ep.type === 'video' ? 'Video' : 'Audio'}</p>
                    </div>
                </div>
            `).join('');
            container.innerHTML += `
                <div class="search-result-item mt-2 border-t border-white/10 pt-2" onclick="handleMobileSearch('${query}')">
                    <div class="flex items-center justify-center w-full">
                        <span class="text-blue-400 font-bold text-sm">Ver todos los resultados para "${query}"</span>
                    </div>
                </div>
            `;
        }
        function clearMobileSearchResults() { document.getElementById('mobileSearchResults').innerHTML = ''; }
        function toggleMobileSearch() {
            const el = document.getElementById('mobileSearchBar');
            const overlay = document.getElementById('searchOverlay');
            if (el.classList.contains('open')) {
                el.classList.remove('open');
                overlay.classList.remove('active');
                document.getElementById('mobileSearchInput').value = '';
                clearMobileSearchResults();
            } else {
                el.classList.add('open');
                overlay.classList.add('active');
                document.getElementById('mobileSearchInput').focus();
            }
        }
        function handleMobileSearch(query) {
            const input = document.getElementById('mobileSearchInput');
            const searchQuery = query || input.value.trim();
            if (searchQuery) {
                Router.navigate('/buscar?q=' + encodeURIComponent(searchQuery));
                closeSearch();
            }
        }
        function closeSearch() {
            document.getElementById('mobileSearchBar').classList.remove('open');
            document.getElementById('searchOverlay').classList.remove('active');
            clearDesktopSearchResults();
            clearMobileSearchResults();
        }
        function showFeed() { Router.navigate('/'); }

        // ==================== SIDEBAR Y AJUSTE DE LAYOUT ====================
        function initSidebar() {
            const sidebar = document.getElementById('desktopSidebar');
            const toggle = document.getElementById('sidebarToggle');
            if (!sidebar || !toggle) return;
            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                const isCollapsed = sidebar.classList.contains('collapsed');
                if (isCollapsed) {
                    sidebar.classList.remove('collapsed');
                    sidebar.classList.add('expanded');
                    document.body.style.marginLeft = '15%';
                    adjustPlayer('15%', 'calc(100% - 15%)');
                } else {
                    sidebar.classList.add('collapsed');
                    sidebar.classList.remove('expanded');
                    document.body.style.marginLeft = '70px';
                    adjustPlayer('70px', 'calc(100% - 70px)');
                }
            });
            function adjustPlayer(left, width) {
                const player = document.querySelector('.player-universal');
                if (player) {
                    player.style.left = left;
                    player.style.width = width;
                }
            }
            // Estado inicial colapsado
            document.body.style.marginLeft = '70px';
            adjustPlayer('70px', 'calc(100% - 70px)');
        }

        // ==================== POBLAR RECOMENDADOS EN SIDEBAR ====================
        function populateSidebarRecs() {
            const container = document.getElementById('sidebarRecList');
            if (!container) return;
            let recs = [];
            if (typeof window.RECOMENDADOS !== 'undefined') {
                try { recs = window.RECOMENDADOS; } catch (e) {}
            }
            if (!recs.length) {
                container.innerHTML = '<div class="text-gray-500 text-xs p-2">No hay recomendados</div>';
                return;
            }
            container.innerHTML = '';
            recs.slice(0, 4).forEach(ep => {
                const item = document.createElement('div');
                item.className = 'rec-item';
                item.innerHTML = `
                    <div class="rec-item-info">
                        <div class="rec-item-title">${ep.title}</div>
                        <div class="rec-item-author">${ep.author || ''}</div>
                    </div>
                    <button class="rec-play-btn" onclick="handlePlay(event, '${ep.mediaUrl}')">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                `;
                container.appendChild(item);
            });
        }

        // ==================== SERVICE WORKER ====================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.error('SW registration failed:', err));
            });
        }

        // ==================== INICIALIZACIÓN ====================
        document.addEventListener('DOMContentLoaded', () => {
            initFeed();
            Router.init();
            initSidebar();
            populateSidebarRecs();
            updateUserIcons();
            window.addEventListener('resize', updateUserIcons);
        });

        // ==================== EXPONER FUNCIONES GLOBALES ====================
        window.addToUserPlaylist = addToUserPlaylist;
        window.removeFromUserPlaylist = removeFromUserPlaylist;
        window.togglePlaylist = togglePlaylist;
        window.playEpisode = playEpisode;
        window.downloadEpisode = downloadEpisode;
        window.Router = Router; // para que los botones "Ver todo" puedan navegar
    </script>
</body>
</html>
