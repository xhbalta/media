<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión</title>
    <style>
        body { background: #050505; color: white; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .container { max-width: 400px; padding: 20px; }
        h1 { font-size: 2rem; margin-bottom: 20px; }
        p { color: #aaa; margin-bottom: 30px; }
        button { background: #3b82f6; border: none; color: white; padding: 12px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sin conexión</h1>
        <p>No tienes acceso a internet. Conéctate a una red para seguir disfrutando.</p>
        <button onclick="window.location.reload()">Reintentar</button>
    </div>
</body>
</html>
